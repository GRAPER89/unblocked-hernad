<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        nav {
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
        }
        h1 {
            text-align: center;
            margin: 20px 0;
        }
        #searchBar {
            display: block;
            margin: 20px auto;
            padding: 10px;
            width: 80%;
            max-width: 600px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        .game-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            transition: transform .2s;
        }
        .game-card:hover {
            transform: scale(1.05);
        }
        .game-card img {
            width: 100%;
            height: auto;
        }
        .game-card a {
            display: block;
            padding: 10px;
            text-decoration: none;
            color: #333;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">Games</a>
        <a href="#">Contact</a>
    </nav>
    <h1>Welcome to Unblocked Games</h1>
    <input type="text" id="searchBar" placeholder="Search for a game...">
    <div class="game-grid" id="gameGrid">
        <!-- Game Cards -->
        <div class="game-card">
            <img src="game-thumbnail-1.jpg" alt="Game 1">
            <a href="game-link-1.html">Game 1</a>
        </div>
        <div class="game-card">
            <img src="game-thumbnail-2.jpg" alt="Game 2">
            <a href="game-link-2.html">Game 2</a>
        </div>
        <!-- Repeat for 50 games -->
    </div>
    <script>
        const searchBar = document.getElementById('searchBar');
        const gameGrid = document.getElementById('gameGrid');
        
        searchBar.addEventListener('input', function() {
            const filter = searchBar.value.toLowerCase();
            const cards = gameGrid.getElementsByClassName('game-card');
            for (let i = 0; i < cards.length; i++) {
                const a = cards[i].getElementsByTagName('a')[0];
                if (a.innerText.toLowerCase().indexOf(filter) > -1) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        });
    </script>
</body>
</html>
